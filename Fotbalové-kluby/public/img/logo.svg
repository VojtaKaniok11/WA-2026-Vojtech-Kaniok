<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>

  <!-- Outer dark blue circle -->
  <circle cx="100" cy="100" r="97" fill="#1a3a5c"/>
  <circle cx="100" cy="100" r="95" fill="#1a3a5c"/>

  <!-- Orange pentagon/hexagon panels (soccer ball pattern) -->
  <!-- Top center panel -->
  <polygon points="100,18 118,28 118,50 100,60 82,50 82,28" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Top left panel -->
  <polygon points="62,30 80,20 80,10 58,15 48,35 58,45" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Top right panel -->
  <polygon points="138,30 120,20 120,10 142,15 152,35 142,45" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Left panel -->
  <polygon points="22,70 40,58 58,68 58,92 40,102 22,90" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Right panel -->
  <polygon points="178,70 160,58 142,68 142,92 160,102 178,90" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Bottom left panel -->
  <polygon points="30,130 48,118 66,128 66,152 48,162 30,150" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Bottom right panel -->
  <polygon points="170,130 152,118 134,128 134,152 152,162 170,150" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Bottom center panel -->
  <polygon points="100,142 118,132 136,142 136,165 118,178 100,178 82,178 64,165 64,142 82,132" fill="#d4763b" clip-path="url(#circle-clip)"/>

  <!-- Center dark blue pentagon for text background -->
  <circle cx="100" cy="100" r="32" fill="#1a3a5c"/>

  <!-- Text MY TEAMS -->
  <text x="100" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="white" letter-spacing="1">MY</text>
  <text x="100" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="white" letter-spacing="1">TEAMS</text>

  <!-- Outer border ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1a3a5c" stroke-width="4"/>
</svg>
